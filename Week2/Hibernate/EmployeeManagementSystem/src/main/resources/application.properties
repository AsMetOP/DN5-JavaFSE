spring.application.name=EmployeeManagementSystem

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.h2.console.enabled=true
spring.jpa.show-sql=true
logging.level.com.cognizant.employeemanagementsystem=DEBUG

# Exercise 9: Data source configuration is fully externalized here.
# Spring Boot's auto-configuration reads these properties and builds
# the DataSource, EntityManagerFactory, and TransactionManager beans
# automatically - no manual @Configuration/@Bean needed for a single
# data source. Supporting a second database would require its own
# prefixed property group (e.g. spring.datasource.secondary.*) plus a
# manual @Configuration class defining separate DataSource,
# EntityManagerFactory, and TransactionManager beans for that second
# source - not implemented here since this app only needs one database,
# but this comment documents the extension point.


# Exercise 10: Hibernate batch processing - groups up to 20
# insert/update statements into fewer round-trips to the database
# instead of one network call per row, plus DynamicUpdate on Employee
# generates UPDATE statements that only set columns that actually
# changed, rather than every column every time.
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true