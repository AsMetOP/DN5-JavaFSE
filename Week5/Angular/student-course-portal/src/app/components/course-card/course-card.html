<div [ngClass]="cardClasses" [ngStyle]="{ 'border-left': '4px solid ' + borderColor }">
  <p>Name: {{ course?.name }}</p>
  <p>Code: {{ course?.code }}</p>
  <p>Credits: {{ course?.credits }}</p>
  <p>ID: {{ course?.id }}</p>

  <span [ngSwitch]="course?.gradeStatus">
    <span *ngSwitchCase="'passed'" style="color: green;">Passed</span>
    <span *ngSwitchCase="'failed'" style="color: red;">Failed</span>
    <span *ngSwitchCase="'pending'" style="color: grey;">Pending</span>
  </span>

  <button (click)="enrollRequested.emit(course.id)">Enroll</button>
  <button (click)="toggleExpand()">Show Details</button>

  <div *ngIf="isExpanded">
    <p>Extra details for {{ course?.name }} go here.</p>
  </div>
</div>
