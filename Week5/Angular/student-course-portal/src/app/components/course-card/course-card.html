<div appHighlight="lightblue" [ngClass]="cardClasses" [ngStyle]="{ 'border-left': '4px solid ' + borderColor }">
  <p (click)="viewDetails()" style="cursor: pointer; text-decoration: underline;">Name: {{ course?.name }}</p>
  <p>Code: {{ course?.code }}</p>
  <p>Credits: {{ course?.credits | creditLabel }}</p>
  <p>ID: {{ course?.id }}</p>
  <span [ngSwitch]="course?.gradeStatus">
    <span *ngSwitchCase="'passed'" style="color: green;">Passed</span>
    <span *ngSwitchCase="'failed'" style="color: red;">Failed</span>
    <span *ngSwitchCase="'pending'" style="color: grey;">Pending</span>
  </span>
  <ng-container *ngIf="enrolledIds$ | async as enrolledIds">
    <button (click)="onEnrollClick(enrolledIds)">
      {{ enrolledIds.includes(course.id) ? 'Unenroll' : 'Enroll' }}
    </button>
  </ng-container>
  <button (click)="toggleExpand()">Show Details</button>
  <div *ngIf="isExpanded">
    <p>Extra details for {{ course?.name }} go here.</p>
  </div>
</div>
