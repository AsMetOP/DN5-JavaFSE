<h1>{{ portalName }}</h1>
<p>Manage your courses, track grades, and stay on top of your academic journey — all in one place.</p>

<div>
  <span>Courses Available: {{ courseCount }}</span>
  <span>Enrolled: 3</span>
  <span>GPA: 3.8</span>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p>{{ message }}</p>

<!--
  [property] is one-way: data flows component -> DOM only (e.g. [disabled]).
  [(ngModel)] is two-way: data flows DOM -> component AND component -> DOM,
  so typing in the input updates searchTerm, and changing searchTerm in code
  would update the input too.
-->
<input [(ngModel)]="searchTerm" placeholder="Search courses...">
<p>Searching for: {{ searchTerm }}</p>
